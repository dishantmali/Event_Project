<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    .admin-sidebar {
        width: 250px;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        background: white;
        border-right: 1px solid #eeedf2;
        display: flex;
        flex-direction: column;
        z-index: 1040;
        font-family: 'Inter', sans-serif;
    }

    .admin-sidebar-header {
        padding: 20px 24px;
        font-size: 1.2rem;
        font-weight: 700;
        border-bottom: 1px solid #eeedf2;
        color: #1e0a3c;
    }

    .admin-sidebar-link {
        color: #6f7287 !important;
        padding: 12px 24px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 12px;
        border-radius: 8px;
        margin: 4px 12px;
        transition: all 0.2s;
        text-decoration: none;
    }

    .admin-sidebar-link:hover {
        background-color: #f8f7fa;
        color: #3659e3 !important;
    }

    .admin-sidebar-link.active {
        background-color: #f0f4ff;
        color: #3659e3 !important;
        font-weight: 600;
    }

    .admin-sidebar-footer {
        margin-top: auto;
        padding: 20px;
        border-top: 1px solid #eeedf2;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .admin-sidebar-avatar {
        width: 36px;
        height: 36px;
        background-color: #3659e3;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
    }

    .admin-content-shift {
        margin-left: 250px !important;
        width: calc(100% - 250px) !important;
        max-width: calc(100% - 250px) !important;
    }
    
    @media (max-width: 768px) {
        .admin-sidebar { display: None; }
        .admin-content-shift { margin-left: 0 !important; }
    }
</style>

<div class="admin-sidebar shadow-sm">
    <div class="admin-sidebar-header">
        Admin Dashboard
    </div>
    <div class="mt-4">
        <a href="{% url 'admin_dashboard' %}?tab=overview" class="admin-sidebar-link {% if request.resolver_match.url_name == 'admin_dashboard' and request.GET.tab != 'requests' %}active{% endif %}">
            <i class="bi bi-grid-1x2"></i> Overview
        </a>
        <a href="{% url 'admin_dashboard' %}?tab=requests" class="admin-sidebar-link {% if request.resolver_match.url_name == 'admin_dashboard' and request.GET.tab == 'requests' %}active{% endif %}">
            <i class="bi bi-people"></i> Organizer Requests
        </a>
        <a href="{% url 'admin_event_list' %}" class="admin-sidebar-link {% if request.resolver_match.url_name == 'admin_event_list' %}active{% endif %}">
            <i class="bi bi-calendar-event"></i> All Events
        </a>
        <a href="{% url 'calendar' %}" class="admin-sidebar-link {% if request.resolver_match.url_name == 'calendar' %}active{% endif %}">
            <i class="bi bi-calendar3"></i> Calendar View
        </a>
    </div>

    <!-- User Profile at Bottom -->
    <div class="admin-sidebar-footer">
        <div class="admin-sidebar-avatar">A</div>
        <div style="font-size: 0.85rem;">
            <div class="fw-bold text-dark">{{ user.username|title }}</div>
            <div class="text-muted" style="font-size: 0.75rem;">{{ user.email|default:"admin@events.com" }}</div>
        </div>
        <div class="ms-auto">
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-link text-danger p-0 border-0"><i class="bi bi-box-arrow-right"></i></button>
            </form>
        </div>
    </div>
</div>
