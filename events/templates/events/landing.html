<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Manager - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .hero-section {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-weight: 700;
            margin-bottom: 20px;
        }
        .btn-custom {
            padding: 10px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            margin: 10px;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-primary-custom {
            background-color: #ff6b6b;
            color: white;
            border: none;
        }
        .btn-primary-custom:hover {
            background-color: #ff5252;
            transform: scale(1.05);
            color: white;
        }
        .btn-outline-custom {
            background-color: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn-outline-custom:hover {
            background-color: white;
            color: #764ba2;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>Welcome to Event Manager</h1>
        <p class="lead mb-4">Discover, Create, and Manage your events effortlessly.</p>
        <div>
            <a href="{% url 'register' %}" class="btn btn-custom btn-primary-custom">Register</a>
            <a href="{% url 'login' %}" class="btn btn-custom btn-outline-custom">Log In</a>
        </div>
        <div class="mt-4">
            <a href="{% url 'event_list' %}" class="text-white text-decoration-none" style="opacity: 0.8;">Or browse events as guest &rarr;</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
