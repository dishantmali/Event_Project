<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Eventify</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        :root {
            --brand-primary: #9333ea;
            --brand-hover: #7e22ce;
            --brand-light: #f3e8ff;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }

        .brand-logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            text-decoration: none;
        }
        
        .brand-logo i { color: var(--brand-primary); }
        .brand-logo:hover { color: #0f172a; }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-control {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.1);
        }

        .btn-brand {
            background-color: var(--brand-primary);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            border: none;
            margin-top: 16px;
            transition: background-color 0.2s;
        }

        .btn-brand:hover {
            background-color: var(--brand-hover);
            color: white;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .auth-footer a {
            color: var(--brand-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="{% url 'landing' %}" class="brand-logo">
            <i class="bi bi-calendar2-range"></i> Eventify
        </a>
        
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Please enter your details to sign in.</p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label mb-0">Password</label>
                </div>
                <input type="password" name="password" class="form-control mt-1" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-brand">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Sign up for free</a>
        </div>
    </div>

    {% if form.errors %}
        <script>
            let errorText = "Invalid Credentials. Please check your username and password.";
            {% if form.non_field_errors %}
                errorText = "{{ form.non_field_errors.0|escapejs }}";
            {% endif %}
            
            Swal.fire({
                icon: 'error',
                title: 'Sign In Failed',
                text: errorText,
                confirmButtonColor: '#9333ea',
                background: '#ffffff',
                color: '#334155',
                customClass: { popup: 'rounded-4' }
            });
        </script>
    {% endif %}

</body>
</html>
