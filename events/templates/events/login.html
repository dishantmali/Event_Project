<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(88, 56, 122, 0.7) 0%, rgba(35, 37, 38, 0.9) 100%);
            z-index: 1;
        }
        .auth-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: white;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-box {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo-box h2 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .logo-box p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        .form-group i {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
        }
        .form-control {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #a872ff;
            box-shadow: 0 0 15px rgba(168, 114, 255, 0.3);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #a872ff 0%, #6830c2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(104, 48, 194, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(104, 48, 194, 0.6);
        }
        .btn-submit:hover::after {
            opacity: 1;
        }
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .auth-footer a {
            color: #d1b3ff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.3s;
        }
        .auth-footer a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="auth-container">
        <div class="logo-box">
            <h2>Welcome Back</h2>
            <p>Ready to manage extraordinary events?</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="form-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-submit">Log In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Sign Up</a>
        </div>
        <div class="auth-footer" style="margin-top:15px; font-size: 0.85rem;">
            <a href="{% url 'landing' %}" style="color:rgba(255,255,255,0.5); font-weight: 400;">&larr; Return Home</a>
        </div>
    </div>

    {% if form.errors %}
        <script>
            let errorText = "Invalid Credentials. Please check your username and password.";
            {% if form.non_field_errors %}
                errorText = "{{ form.non_field_errors.0|escapejs }}";
            {% endif %}
            
            Swal.fire({
                icon: 'error',
                title: 'Access Denied',
                text: errorText,
                background: '#1e1e24',
                color: '#ffffff',
                confirmButtonColor: '#a872ff',
                customClass: {
                    popup: 'border-radius-15'
                }
            });
        </script>
    {% endif %}
</body>
</html>
