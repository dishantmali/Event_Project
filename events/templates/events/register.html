<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Free Account - Eventify</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        :root {
            --brand-primary: #9333ea;
            --brand-hover: #7e22ce;
            --brand-light: #f3e8ff;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }

        .brand-logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            text-decoration: none;
        }
        
        .brand-logo i { color: var(--brand-primary); }
        .brand-logo:hover { color: #0f172a; }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-control {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            font-size: 0.95rem;
            transition: all 0.2s;
            width: 100%;
        }

        .form-control:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.1);
        }

        .form-text {
            display: block;
            margin-top: 6px;
            font-size: 0.8rem;
            color: #64748b;
        }

        .btn-brand {
            background-color: var(--brand-primary);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            border: none;
            margin-top: 16px;
            transition: background-color 0.2s;
        }

        .btn-brand:hover {
            background-color: var(--brand-hover);
            color: white;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .auth-footer a {
            color: var(--brand-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="{% url 'landing' %}" class="brand-logo">
            <i class="bi bi-calendar2-range"></i> Eventify
        </a>
        
        <h1 class="auth-title">Create Free Account</h1>
        <p class="auth-subtitle">Join thousands of event organizers and attendees.</p>

        <form method="post" id="registerForm">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small class="form-text">{{ field.help_text }}</small>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-brand">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>

    <!-- Apply custom styles to auto-rendered inputs -->
    <script>
        document.querySelectorAll('input').forEach(e => {
            if(e.type !== 'hidden' && e.type !== 'submit') {
                e.classList.add('form-control');
            }
        });
    </script>

    {% if form.errors %}
        <script>
            let errorHtml = '<div style="text-align:left; color:#334155; font-size:0.95rem; background:#f8fafc; padding:15px; border-radius:12px; border: 1px solid rgba(147,51,234,0.2);">';
            errorHtml += '<ul style="margin:0; padding-left:20px;">';
            {% for field in form %}
                {% for error in field.errors %}
                    errorHtml += '<li style="margin-bottom:5px;"><b>{{ field.label }}:</b> {{ error|escapejs }}</li>';
                {% endfor %}
            {% endfor %}
            {% for error in form.non_field_errors %}
                errorHtml += '<li style="margin-bottom:5px;">{{ error|escapejs }}</li>';
            {% endfor %}
            errorHtml += '</ul></div>';

            Swal.fire({
                icon: 'error',
                title: 'Wait a second...',
                html: errorHtml,
                confirmButtonColor: '#9333ea',
                background: '#ffffff',
                color: '#334155',
                iconColor: '#ef4444',
                customClass: { popup: 'rounded-4' }
            });
        </script>
    {% endif %}

</body>
</html>
