<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Event Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(35, 37, 38, 0.9) 0%, rgba(88, 56, 122, 0.8) 100%);
            z-index: 1;
        }
        .auth-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            color: white;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin: 40px 20px;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-box h2 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .logo-box p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .form-text {
            display: block;
            margin-top: 6px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5253 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(238, 82, 83, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(238, 82, 83, 0.6);
        }
        .btn-submit:hover::after {
            opacity: 1;
        }
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .auth-footer a {
            color: #ff9e9e;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.3s;
        }
        .auth-footer a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="auth-container">
        <div class="logo-box">
            <h2>Join Us</h2>
            <p>Create an account to unlock all features</p>
        </div>
        <form method="post" id="registerForm">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small class="form-text">{{ field.help_text }}</small>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
        <div class="auth-footer" style="margin-top:15px; font-size: 0.85rem;">
            <a href="{% url 'landing' %}" style="color:rgba(255,255,255,0.5); font-weight: 400;">&larr; Return Home</a>
        </div>
    </div>

    <!-- Apply custom styles to auto-rendered inputs -->
    <script>
        document.querySelectorAll('input').forEach(e => {
            if(e.type !== 'hidden' && e.type !== 'submit') {
                e.classList.add('form-control');
            }
        });
    </script>

    {% if form.errors %}
        <script>
            let errorHtml = '<div style="text-align:left; color:#ffffff; font-size:0.95rem; background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; border: 1px solid rgba(255,107,107,0.3);">';
            errorHtml += '<ul style="margin:0; padding-left:20px;">';
            {% for field in form %}
                {% for error in field.errors %}
                    errorHtml += '<li style="margin-bottom:5px;"><b>{{ field.label }}:</b> {{ error|escapejs }}</li>';
                {% endfor %}
            {% endfor %}
            {% for error in form.non_field_errors %}
                errorHtml += '<li style="margin-bottom:5px;">{{ error|escapejs }}</li>';
            {% endfor %}
            errorHtml += '</ul></div>';

            Swal.fire({
                icon: 'error',
                title: 'Wait a second...',
                html: errorHtml,
                background: '#1e1e24',
                color: '#ffffff',
                confirmButtonColor: '#ff6b6b',
                html: errorHtml,
                iconColor: '#ff6b6b',
                customClass: {
                    popup: 'border-radius-15'
                }
            });
        </script>
    {% endif %}
</body>
</html>
