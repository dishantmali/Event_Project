<!DOCTYPE html>
<html>
<head>
    <title>Event Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-card {
            border-radius: 15px;
            border: none;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card form-card shadow p-4">

                <h3 class="mb-4 text-center">
                    {% if event %}Edit Event{% else %}Create Event{% endif %}
                </h3>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" value="{{ event.title|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control">{{ event.description|default:'' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" value="{{ event.location|default:'' }}">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Date</label>
                            <input type="date" name="date" class="form-control" value="{{ event.date|date:'Y-m-d' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Time</label>
                            <input type="time" name="time" class="form-control" value="{{ event.time|time:'H:i' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Category</label>
                        <input type="text" name="category" class="form-control" value="{{ event.category|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label>Banner Image</label>
                        <input type="file" name="banner" class="form-control">
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/" class="btn btn-secondary">⬅ Back</a>
                        <button type="submit" class="btn btn-primary">
                            💾 Save Event
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
